repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: nice -n 19 cargo fmt
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: nice -n 19 cargo clippy
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-test
        name: cargo test
        entry: nice -n 19 cargo test
        language: system
        types: [rust]
        pass_filenames: false
