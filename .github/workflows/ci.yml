name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Build
        run: nice -n 19 cargo build --verbose

      - name: Run tests
        run: nice -n 19 cargo test --verbose

      - name: Run clippy
        run: nice -n 19 cargo clippy -- -D warnings

      - name: Check formatting
        run: nice -n 19 cargo fmt -- --check

      - name: Build examples
        run: nice -n 19 cargo build --examples --verbose

  wasm:
    name: WebAssembly Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-wasm-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-build-

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli

      - name: Build WASM package
        run: ./build-wasm.sh

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run WASM tests with Deno
        run: deno test --allow-read tests/wasm_test.ts

  real-files:
    name: Real File Format Tests
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if test files exist
        id: check_files
        run: |
          if [ -f /fpexif/raws/welcome.html ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Test files found at /fpexif/raws"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Test files not found - skipping real file tests"
          fi

      - name: Install Rust toolchain
        if: steps.check_files.outputs.exists == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install exiftool
        if: steps.check_files.outputs.exists == 'true'
        run: |
          if ! command -v exiftool &> /dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq libimage-exiftool-perl
          fi
          exiftool -ver

      - name: Cache cargo registry
        if: steps.check_files.outputs.exists == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        if: steps.check_files.outputs.exists == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache cargo build
        if: steps.check_files.outputs.exists == 'true'
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Run all tests (including format-specific tests)
        if: steps.check_files.outputs.exists == 'true'
        run: nice -n 19 cargo test --verbose
        env:
          CI: true
          FPEXIF_TEST_FILES: /fpexif/raws
