        env:
          CI: true
          FPEXIF_TEST_FILES: /fpexif/raws

      - name: Run remaining integration tests
        run: |
          set -eo pipefail
          nice -n 19 cargo test --verbose -- --nocapture --skip test_exiftool_json_compatibility --skip test_exiv2_compatibility 2>&1 | tee -a test-output.txt
        env:
          CI: true
          FPEXIF_TEST_FILES: /fpexif/raws

      - name: Generate test issues report
        if: always() && github.event_name == 'pull_request'
        run: |
          # Check if Deno exists
          if command -v deno &> /dev/null; then
            deno run --allow-read --allow-write scripts/pr-comment.ts test-issues-report.md
          else
            # Fallback: create a simple report from JSON files
            echo "## Test Issues Report" > test-issues-report.md
            echo "" >> test-issues-report.md
            if [ -d test-results ] && [ "$(ls -A test-results 2>/dev/null)" ]; then
              echo "### Results" >> test-issues-report.md
              echo "" >> test-issues-report.md
              echo '```json' >> test-issues-report.md
              cat test-results/*.json >> test-issues-report.md 2>/dev/null || echo "No JSON files found"
              echo '```' >> test-issues-report.md
            else
              echo "### All Clear!" >> test-issues-report.md
              echo "" >> test-issues-report.md
              echo "No test issues detected." >> test-issues-report.md
            fi
          fi

      - name: Post test issues comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '## Test Issues Report\n\nNo report generated.';
            try {
              report = fs.readFileSync('test-issues-report.md', 'utf8');
            } catch (e) {
              console.log('No report file found:', e.message);
            }

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Test Issues Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: report
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report
              });
            }

      - name: Run clippy
        run: ./bin/ccc

      - name: Build examples
        run: nice -n 19 cargo build --examples --verbose

  wasm:
    name: wasm
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if Rust is installed
        id: check_rust
        run: |
          if command -v cargo &> /dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Rust found: $(rustc --version)"
            # Ensure wasm target is installed
            rustup target add wasm32-unknown-unknown 2>/dev/null || true
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Rust not found, will install"
          fi

      - name: Install Rust toolchain
        if: steps.check_rust.outputs.exists != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-wasm-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-build-

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli

      - name: Build WASM package
        run: ./build-wasm.sh

      - name: Check if Deno exists
        id: check_deno
        run: |
          if command -v deno &> /dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Deno found: $(deno --version | head -1)"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Deno not found, will install"
          fi

      - name: Setup Deno
        if: steps.check_deno.outputs.exists != 'true'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run WASM tests with Deno
        run: deno test --allow-read tests/wasm_test.ts

