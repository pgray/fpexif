name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build and Test
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if test files exist
        id: check_files
        run: |
          if [ -f /fpexif/raws/welcome.html ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Test files found at /fpexif/raws"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Test files not found - real file tests will fail"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check exiftool and exiv2
        run: |
          exiftool -ver
          exiv2 --version | head -1

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Build
        run: nice -n 19 cargo build --verbose

      - name: Run tests
        run: |
          set -eo pipefail
          nice -n 19 cargo test --verbose 2>&1 | tee test-output.txt
        env:
          CI: true
          FPEXIF_TEST_FILES: /fpexif/raws

      - name: Extract test issues report
        if: always() && github.event_name == 'pull_request'
        id: test_issues
        run: |
          # Extract various test issues from test output
          UNKNOWN_TAGS=$(grep -E "unknown tags:" test-output.txt || true)
          MISSING_FIELDS=$(grep -E "Missing field in fpexif:" test-output.txt || true)
          VALUE_MISMATCHES=$(grep -E "mismatch:" test-output.txt | grep -v "Found.*mismatches" || true)
          CRITICAL_DIFFS=$(grep -E "Found.*critical differences" test-output.txt || true)

          # Count issues
          UNKNOWN_TAGS_COUNT=$(echo "$UNKNOWN_TAGS" | grep -c "unknown tags:" || echo "0")
          MISSING_FIELDS_COUNT=$(echo "$MISSING_FIELDS" | wc -l)
          VALUE_MISMATCHES_COUNT=$(echo "$VALUE_MISMATCHES" | wc -l)
          TOTAL_ISSUES=$((UNKNOWN_TAGS_COUNT + MISSING_FIELDS_COUNT + VALUE_MISMATCHES_COUNT))

          HAS_ISSUES=false

          {
            echo "## Test Issues Report"
            echo ""

            # Summary section at the top
            if [ $TOTAL_ISSUES -gt 0 ]; then
              HAS_ISSUES=true
              echo "### 📊 Summary"
              echo ""
              echo "- **Total Issues:** $TOTAL_ISSUES"
              echo "- Unknown Tag Warnings: $UNKNOWN_TAGS_COUNT"
              echo "- Missing Fields: $MISSING_FIELDS_COUNT"
              echo "- Value Mismatches: $VALUE_MISMATCHES_COUNT"
              echo ""
            fi

            if [ -n "$UNKNOWN_TAGS" ]; then
              echo "### Unknown EXIF Tags"
              echo ""
              echo "The following unknown EXIF tags were encountered:"
              echo ""
              echo "\`\`\`"
              echo "$UNKNOWN_TAGS"
              echo "\`\`\`"
              echo ""
              echo "To add support, add definitions to \`src/tags.rs\`."
              echo ""
            fi

            if [ -n "$MISSING_FIELDS" ]; then
              echo "### Missing Fields"
              echo ""
              echo "fpexif is missing the following fields that exiftool/exiv2 support:"
              echo ""
              echo "\`\`\`"
              echo "$MISSING_FIELDS" | head -20
              if [ $(echo "$MISSING_FIELDS" | wc -l) -gt 20 ]; then
                echo "... and $(( $(echo "$MISSING_FIELDS" | wc -l) - 20 )) more"
              fi
              echo "\`\`\`"
              echo ""
            fi

            if [ -n "$VALUE_MISMATCHES" ]; then
              echo "### Value Mismatches"
              echo ""
              echo "The following fields have mismatched values:"
              echo ""
              echo "\`\`\`"
              echo "$VALUE_MISMATCHES" | head -20
              if [ $(echo "$VALUE_MISMATCHES" | wc -l) -gt 20 ]; then
                echo "... and $(( $(echo "$VALUE_MISMATCHES" | wc -l) - 20 )) more"
              fi
              echo "\`\`\`"
              echo ""
            fi

            if [ -n "$CRITICAL_DIFFS" ]; then
              echo "### Critical Differences"
              echo ""
              echo "\`\`\`"
              echo "$CRITICAL_DIFFS"
              echo "\`\`\`"
              echo ""
            fi

            if [ "$HAS_ISSUES" = false ]; then
              echo "### ✅ All Clear!"
              echo ""
              echo "All tests passed! No unknown tags, missing fields, or value mismatches."
            fi
          } > test-issues-report.md

          if [ "$HAS_ISSUES" = true ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Post test issues comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('test-issues-report.md', 'utf8');

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Test Issues Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: report
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report
              });
            }

      - name: Run clippy
        run: ./bin/ccc

      - name: Build examples
        run: nice -n 19 cargo build --examples --verbose

  wasm:
    name: WebAssembly Build and Test
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-wasm-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-build-

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli

      - name: Build WASM package
        run: ./build-wasm.sh

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run WASM tests with Deno
        run: deno test --allow-read tests/wasm_test.ts

  release-binaries:
    name: Build Release Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: fpexif
            asset_name: fpexif-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: fpexif
            asset_name: fpexif-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: fpexif
            asset_name: fpexif-macos-aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-git-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-release-

      - name: Build release binary
        run: nice -n 19 cargo build --release --features cli --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} artifacts/${{ matrix.asset_name }}
          chmod +x artifacts/${{ matrix.asset_name }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: artifacts/${{ matrix.asset_name }}
          if-no-files-found: error
