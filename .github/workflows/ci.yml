name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build and Test
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if test files exist
        id: check_files
        run: |
          if [ -f /fpexif/raws/welcome.html ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Test files found at /fpexif/raws"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Test files not found - real file tests will fail"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install exiftool
        run: |
          if ! command -v exiftool &> /dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq libimage-exiftool-perl
          fi
          exiftool -ver

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Build
        run: nice -n 19 cargo build --verbose

      - name: Run tests
        run: nice -n 19 cargo test --verbose 2>&1 | tee test-output.txt
        env:
          CI: true
          FPEXIF_TEST_FILES: /fpexif/raws

      - name: Extract unknown tags report
        if: github.event_name == 'pull_request'
        id: unknown_tags
        run: |
          # Extract unknown tag lines from test output
          UNKNOWN_TAGS=$(grep -E "unknown tags:" test-output.txt || true)

          if [ -n "$UNKNOWN_TAGS" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            # Create report content
            {
              echo "## Unknown Tags Report"
              echo ""
              echo "The following unknown EXIF tags were encountered during testing:"
              echo ""
              echo "\`\`\`"
              echo "$UNKNOWN_TAGS"
              echo "\`\`\`"
              echo ""
              echo "To add support for these tags, add definitions to \`src/tags.rs\`."
            } > unknown-tags-report.md
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "No unknown tags found!" > unknown-tags-report.md
          fi

      - name: Post unknown tags comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const found = '${{ steps.unknown_tags.outputs.found }}' === 'true';

            let report;
            if (found) {
              report = fs.readFileSync('unknown-tags-report.md', 'utf8');
            } else {
              report = '## Unknown Tags Report\n\n✅ All EXIF tags are identified! No unknown tags found.';
            }

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Unknown Tags Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: report
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report
              });
            }

      - name: Run clippy
        run: nice -n 19 cargo clippy -- -D warnings

      - name: Check formatting
        run: nice -n 19 cargo fmt -- --check

      - name: Build examples
        run: nice -n 19 cargo build --examples --verbose

  wasm:
    name: WebAssembly Build and Test
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-wasm-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-build-

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli

      - name: Build WASM package
        run: ./build-wasm.sh

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run WASM tests with Deno
        run: deno test --allow-read tests/wasm_test.ts

  release-binaries:
    name: Build Release Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: fpexif
            asset_name: fpexif-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: fpexif
            asset_name: fpexif-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: fpexif
            asset_name: fpexif-macos-aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-git-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-release-

      - name: Build release binary
        run: nice -n 19 cargo build --release --features cli --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} artifacts/${{ matrix.asset_name }}
          chmod +x artifacts/${{ matrix.asset_name }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: artifacts/${{ matrix.asset_name }}
          if-no-files-found: error
