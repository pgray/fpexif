name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PATH: /home/gha/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/bin:/usr/bin/site_perl:/usr/bin/vendor_perl:/usr/bin/core_perl

jobs:
  build:
    name: build
    runs-on: self-hosted

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Check if test files exist
        id: check_files
        run: |
          if [ -f /fpexif/raws/welcome.html ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Test files found at /fpexif/raws"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Test files not found - real file tests will fail"
          fi

      - name: Check if Rust is installed
        id: check_rust
        run: |
          if command -v cargo &> /dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Rust found: $(rustc --version)"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Rust not found, will install"
          fi

      - name: Install Rust toolchain
        if: steps.check_rust.outputs.exists != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check exiftool and exiv2
        run: |
          exiftool -ver
          exiv2 --version | head -1

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Build
        run: nice -n 19 cargo build --verbose

      - name: Run unit tests
        run: |
          set -eo pipefail
          mkdir -p test-results
          nice -n 19 cargo test --lib --verbose -- --nocapture 2>&1 | tee test-output.txt
        env:
          CI: true

      - name: Test CR2 format
        run: nice -n 19 cargo test --test exiftool_json_comparison test_exiftool_json_compatibility_cr2 -- --nocapture
        env:
          CI: true
          FPEXIF_TEST_FILES: /fpexif/raws

      - name: Test NEF format
        run: nice -n 19 cargo test --test exiftool_json_comparison test_exiftool_json_compatibility_nef -- --nocapture
        env:
          CI: true
          FPEXIF_TEST_FILES: /fpexif/raws

      - name: Test ARW format
        run: nice -n 19 cargo test --test exiftool_json_comparison test_exiftool_json_compatibility_arw -- --nocapture
        env:
          CI: true
          FPEXIF_TEST_FILES: /fpexif/raws

      - name: Test ORF format
        run: nice -n 19 cargo test --test exiftool_json_comparison test_exiftool_json_compatibility_orf -- --nocapture
        env:
          CI: true
          FPEXIF_TEST_FILES: /fpexif/raws

      - name: Test DNG format
