name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  version-bump:
    name: Version Bump
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.create-tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Update version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "Updating version to $VERSION..."
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Verify build
        run: cargo check

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "${{ github.event.inputs.version }}"
          git push

      - name: Create and push tag
        id: create-tag
        run: |
          TAG="v${{ github.event.inputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  build-linux:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: [version-bump]
    if: always() && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.version-bump.outputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: cross build --release --features cli --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../fpexif-${{ matrix.target }}.tar.gz fpexif

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fpexif-${{ matrix.target }}
          path: fpexif-${{ matrix.target }}.tar.gz

  build-macos:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: [version-bump]
    if: always() && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.version-bump.outputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --features cli --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../fpexif-${{ matrix.target }}.tar.gz fpexif

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fpexif-${{ matrix.target }}
          path: fpexif-${{ matrix.target }}.tar.gz

  build-wasm:
    name: Build WASM Package
    runs-on: ubuntu-latest
    needs: [version-bump]
    if: always() && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.version-bump.outputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build with wasm-pack
        run: wasm-pack build --target web --features wasm --scope pgray

      - name: Create npm tarball
        run: |
          cd pkg
          npm pack
          mv *.tgz ../fpexif-wasm.tgz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fpexif-wasm
          path: fpexif-wasm.tgz

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [version-bump]
    if: always() && (needs.version-bump.result == 'success' || (needs.version-bump.result == 'skipped' && startsWith(github.ref, 'refs/tags/')))

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.version-bump.outputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify build
        run: cargo check

      - name: Publish fpexif
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: Create Release
    needs: [version-bump, build-linux, build-macos, build-wasm, publish-crates]
    runs-on: ubuntu-latest
    if: always() && needs.publish-crates.result == 'success'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: fpexif-*
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-bump.outputs.tag || github.ref_name }}
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.tgz
          generate_release_notes: true
