name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux x86_64 binary from latest CI run
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci.yml
          branch: main
          name: fpexif-linux-x86_64
          path: artifacts/fpexif-linux-x86_64
          check_artifacts: true

      - name: Download macOS x86_64 binary from latest CI run
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci.yml
          branch: main
          name: fpexif-macos-x86_64
          path: artifacts/fpexif-macos-x86_64
          check_artifacts: true

      - name: Download macOS ARM64 binary from latest CI run
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci.yml
          branch: main
          name: fpexif-macos-aarch64
          path: artifacts/fpexif-macos-aarch64
          check_artifacts: true

      - name: Package binaries as tar.gz
        run: |
          cd artifacts/fpexif-linux-x86_64
          tar -czf fpexif-linux-x86_64.tar.gz fpexif-linux-x86_64
          cd ../fpexif-macos-x86_64
          tar -czf fpexif-macos-x86_64.tar.gz fpexif-macos-x86_64
          cd ../fpexif-macos-aarch64
          tar -czf fpexif-macos-aarch64.tar.gz fpexif-macos-aarch64

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/fpexif-linux-x86_64/fpexif-linux-x86_64.tar.gz
            artifacts/fpexif-macos-x86_64/fpexif-macos-x86_64.tar.gz
            artifacts/fpexif-macos-aarch64/fpexif-macos-aarch64.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
