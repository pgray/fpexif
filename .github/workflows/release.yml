name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to create (e.g., v0.1.0)'
        required: true
        type: string
      commit:
        description: 'Commit SHA or ref to use for binaries (must have CI run with artifacts)'
        required: true
        type: string

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit || github.ref }}

      - name: Set version variable
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "commit=${{ inputs.commit }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "commit=${GITHUB_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Download Linux x86_64 binary from CI run
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci.yml
          commit: ${{ steps.version.outputs.commit }}
          name: fpexif-linux-x86_64
          path: artifacts/fpexif-linux-x86_64
          check_artifacts: true

      - name: Download macOS x86_64 binary from CI run
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci.yml
          commit: ${{ steps.version.outputs.commit }}
          name: fpexif-macos-x86_64
          path: artifacts/fpexif-macos-x86_64
          check_artifacts: true

      - name: Download macOS ARM64 binary from CI run
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci.yml
          commit: ${{ steps.version.outputs.commit }}
          name: fpexif-macos-aarch64
          path: artifacts/fpexif-macos-aarch64
          check_artifacts: true

      - name: Package binaries as tar.gz
        run: |
          cd artifacts/fpexif-linux-x86_64
          tar -czf fpexif-linux-x86_64.tar.gz fpexif-linux-x86_64
          cd ../fpexif-macos-x86_64
          tar -czf fpexif-macos-x86_64.tar.gz fpexif-macos-x86_64
          cd ../fpexif-macos-aarch64
          tar -czf fpexif-macos-aarch64.tar.gz fpexif-macos-aarch64

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create or update git tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            artifacts/fpexif-linux-x86_64/fpexif-linux-x86_64.tar.gz
            artifacts/fpexif-macos-x86_64/fpexif-macos-x86_64.tar.gz
            artifacts/fpexif-macos-aarch64/fpexif-macos-aarch64.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
